<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha512-tDXPcamuZsWWd6OsKFyH6nAqh/MjZ/5Yk88T5o+aMfygqNFPan1pLyPFAndRzmOWHKT+jSDzWpJv8krj6x1LMA==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        .bs-headbing{
            text-align: center;
        }
    </style>


</head>

<body>
    <h1 class="bs-headbing">Codingal</h1>
    <div class="container">
        <div class="card" style="width: 18rem;">

            <!-- Card top image -->
            <img class="card-img-top" src="https://t3.ftcdn.net/jpg/03/46/83/96/360_F_346839683_6nAPzbhpSkIpb8pmAwufkC7c5eD7wYws.jpg" alt="profile pic not found">


            <!-- card body -->

            <div class="card-body">
                <h5 class="card-title">User Name</h5>
                <p class="card-text">Passionate about programming</p>
            </div>

             <a href="#" class="btn btn-primary">See Profile</a> 
        </div>
    </div>

    
</body>
</html>
